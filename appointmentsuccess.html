<!DOCTYPE html>
<html>
<head>
    <title>Appointment Confirmed</title>

    <style>

        body{
            font-family:Segoe UI;
            background:#f4f7f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:500px;
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            color:#4CAF50;
            margin-bottom:20px;
        }

        p{
            margin:10px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            color:white;
            background:#4a90e2;
            font-size:16px;
        }

        button:hover{
            opacity:0.9;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>
        ✅ Appointment Confirmed
    </h1>

    <p id="doctor"></p>

    <p id="date"></p>

    <p id="time"></p>

    <hr>

    <h3>
        🧘 Tips Before Session
    </h3>

    <p>
        ✓ Sleep well before session.
    </p>

    <p>
        ✓ Write down your thoughts.
    </p>

    <p>
        ✓ Join your session on time.
    </p>

    <button
    onclick="location.href='dashboard.html'">
        Go to Dashboard
    </button>

    <button
    onclick="location.href='myappointments.html'">
        My Appointments
    </button>

</div>

<script>

document.getElementById(
    "doctor"
).innerHTML =
    "👨‍⚕️ Therapist: "
    + localStorage.getItem(
        "appointmentTherapist"
      );

document.getElementById(
    "date"
).innerHTML =
    "📅 Date: "
    + localStorage.getItem(
        "appointmentDate"
      );

document.getElementById(
    "time"
).innerHTML =
    "⏰ Time: "
    + localStorage.getItem(
        "appointmentTime"
      );

</script>

</body>
</html>
