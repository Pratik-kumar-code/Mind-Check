<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindWell Journal</title>

  <style>

    :root{

      --bg-color:#f8f7f2;
      --card-bg:#fffefb;
      --text-main:#2d3436;
      --accent-green:#96b3a2;
      --border-color:#e0e0e0;
      --shadow:0 4px 12px rgba(0,0,0,0.05);
    }

    *{

      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,sans-serif;
    }

    body{

      background:var(--bg-color);
      color:var(--text-main);
    }

    header{

      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      background:var(--card-bg);
      border-bottom:1px solid var(--border-color);
      box-shadow:var(--shadow);
    }

    .logo{

      font-size:24px;
      font-weight:bold;
      color:var(--accent-green);
    }

    nav a{

      margin:0 12px;
      text-decoration:none;
      color:var(--text-main);
      font-weight:500;
    }

    nav a.active{

      background:var(--accent-green);
      color:white;
      padding:8px 15px;
      border-radius:8px;
    }

    .container{

      max-width:1000px;
      margin:40px auto;
      padding:20px;
    }

    .card{

      background:var(--card-bg);
      padding:25px;
      border-radius:15px;
      box-shadow:var(--shadow);
      border:1px solid var(--border-color);
      margin-bottom:25px;
    }

    h1{

      margin-bottom:20px;
    }

    h3{

      margin-bottom:15px;
      color:var(--accent-green);
    }

    
    textarea{

      width:100%;
      height:180px;
      padding:15px;
      border-radius:10px;
      border:1px solid var(--border-color);
      resize:none;
      font-size:16px;
      margin-top:10px;
      outline:none;
    }

    textarea:focus{

      border:1px solid var(--accent-green);
    }

    button{

      background:var(--accent-green);
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      cursor:pointer;
      margin-top:15px;
      font-size:15px;
    }

    button:hover{

      opacity:0.9;
    }

    .prompt{

      background:#eef7f0;
      padding:15px;
      border-left:5px solid var(--accent-green);
      border-radius:10px;
      margin-bottom:20px;
      font-style:italic;
    }

    .entry{

      background:#f9f9f9;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      border-left:4px solid var(--accent-green);
    }

    .mood-buttons{

      display:flex;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .mood-btn{

      padding:10px 15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#ddd;
      font-size:18px;
    }

    .mood-btn:hover{

      transform:scale(1.05);
    }

    footer{

      text-align:center;
      padding:30px;
      opacity:0.7;
    }

  </style>
</head>

<body>

<header>

  <div class="logo">
    🌿 MindWell
  </div>

  <nav>

    <a href="dashboard.html">
      Dashboard
    </a>

    <a href="journal.html" class="active">
      Journal
    </a>

    <a href="#">
      Resources
    </a>

    <a href="#">
      Profile
    </a>

  </nav>

</header>

<div class="container">

  <h1>
    📖 Personal Journal
  </h1>

  <!-- Journal Prompt -->

  <div class="card">

    <h3>
      🌈 Daily Reflection Prompt
    </h3>

    <div class="prompt">

      “What made you smile today,
      and what challenged you emotionally?”

    </div>

    <input
    type="text"
    id="journalTitle"
    placeholder="Journal Title"
    style="
        width:100%;
        padding:12px;
        border-radius:10px;
        border:1px solid #ccc;
        margin-bottom:15px;
        font-size:16px;
    ">
    
    <textarea
      id="journalText"
      placeholder="Write your thoughts here..."
    ></textarea>

    <!-- Mood Selection -->

    <div class="mood-buttons">

      <button class="mood-btn"
        onclick="selectMood('😊 Happy')">

        😊

      </button>

      <button class="mood-btn"
        onclick="selectMood('😔 Sad')">

        😔

      </button>

      <button class="mood-btn"
        onclick="selectMood('😰 Stressed')">

        😰

      </button>

      <button class="mood-btn"
        onclick="selectMood('😌 Calm')">

        😌

      </button>

      <button class="mood-btn"
        onclick="selectMood('😴 Tired')">

        😴

      </button>

    </div>

    <p id="selectedMood"
      style="
        margin-top:15px;
        font-weight:bold;
      ">

      Selected Mood:
      None

    </p>

    <button onclick="saveJournal()">

      Save Journal Entry

    </button>

  </div>

  <!-- Saved Entries -->

  <div class="card">

    <h3>
      📝 Saved Journal Entries
    </h3>

    <div id="entriesContainer">

      <p>
        No journal entries yet.
      </p>

    </div>

  </div>

</div>

<footer>

  💙 Express your emotions freely.
  Your thoughts matter.

</footer>

<script>

  let selectedMood = "None";

  function selectMood(mood){

    selectedMood = mood;

    document.getElementById(
      "selectedMood"
    ).innerText =
      "Selected Mood: " + mood;
  }


// Save journal

async function saveJournal(){

    const title =
        document.getElementById(
            "journalTitle"
        ).value;

    const text =
        document.getElementById(
            "journalText"
        ).value;

    const email =
        localStorage.getItem(
            "userEmail"
        );

    if(title === "" || text === ""){

        alert(
            "Please fill all fields."
        );

        return;
    }

    try{

        const response =
            await fetch(
                "http://localhost:5000/journal",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        userEmail: email,
                        title: title,
                        mood: selectedMood,
                        content: text
                    })
                }
            );

        const data =
            await response.json();

        alert(data.message);
        loadJournals();
        document.getElementById(
            "journalTitle"
        ).value = "";

        document.getElementById(
            "journalText"
        ).value = "";

        selectedMood = "None";

        document.getElementById(
            "selectedMood"
        ).innerText =
            "Selected Mood: None";

    }

    catch(error){

        console.log(error);

        alert("Server Error");
    }
}


// Load Journal Entries
async function loadJournals() {

    const email = localStorage.getItem("userEmail");

    if (!email) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    try {

        const response = await fetch(
            "http://localhost:5000/journal/" + email
        );

        const data = await response.json();

        const container =
            document.getElementById("entriesContainer");

        container.innerHTML = "";

        if (data.length === 0) {

            container.innerHTML =
                "<p>No journal entries found.</p>";

            return;
        }

        data.forEach(item => {

            container.innerHTML += `

            <div class="entry">

                <h3>${item.title}</h3>

                <p><strong>Mood:</strong> ${item.mood}</p>

                <p>${item.content}</p>

                <small>
                    ${new Date(item.createdAt).toLocaleString()}
                </small>

                <br><br>

                <button
                    onclick="deleteJournal('${item._id}')">

                    🗑 Delete Entry

                </button>

            </div>

            `;

        });

    }

    catch (error) {

        console.log(error);

        alert("Unable to load journal entries.");

    }

}


// Delete Journal
async function deleteJournal(id) {

    const confirmDelete =
        confirm("Are you sure you want to delete this journal?");

    if (!confirmDelete) {
        return;
    }

    try {

        const response =
            await fetch(
                "http://localhost:5000/journal/" + id,
                {
                    method: "DELETE"
                }
            );

        const data =
            await response.json();

        alert(data.message);

        loadJournals();

    }

    catch (error) {

        console.log(error);

        alert("Unable to delete journal.");

    }

}

// Load journals automatically
loadJournals();

</script>

</body>
</html>
