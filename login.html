<!DOCTYPE html>
<html lang="en">
<head>
  <script src="api-config.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>Login - MindWell</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,sans-serif;
    }

    body{

      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(
        135deg,
        #dfe9f3,
        #ffffff
      );
    }

    .login-container{

      width:400px;
      background:white;
      padding:35px;
      border-radius:20px;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.1);

      animation:fadeIn 1s ease;
    }

    .logo{

      text-align:center;
      font-size:45px;
      margin-bottom:10px;
    }

    .login-container h2{

      text-align:center;
      margin-bottom:10px;
      color:#4a6d5a;
    }

    .subtitle{

      text-align:center;
      color:#666;
      margin-bottom:25px;
      font-size:14px;
    }

    .input-group{

      margin-bottom:18px;
    }

    .input-group label{

      display:block;
      margin-bottom:6px;
      color:#444;
      font-weight:500;
    }

    .input-group input{

      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    .input-group input:focus{

      border-color:#4a90e2;

      box-shadow:
      0 0 8px rgba(74,144,226,0.3);
    }

    .login-error{

      display:none;
      margin-top:-10px;
      margin-bottom:18px;
      color:#d32f2f;
      font-size:14px;
    }

    .login-btn{

      width:100%;
      padding:13px;

      background:
      linear-gradient(
        90deg,
        #4a90e2,
        #6ab04c
      );

      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;

      transition:0.3s;
    }

    .login-btn:hover{

      transform:scale(1.02);
      opacity:0.95;
    }

    .admin-btn{

      display:block;
      width:100%;
      margin-top:12px;
      padding:13px;

      background:white;
      color:#4a6d5a;
      border:1px solid #4a6d5a;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      text-align:center;
      text-decoration:none;

      transition:0.3s;
    }

    .admin-btn:hover{

      background:#eef6f0;
      transform:scale(1.02);
    }

    .signup-text{

      text-align:center;
      margin-top:18px;
      color:#555;
    }

    .signup-text a{

      color:#4a90e2;
      text-decoration:none;
      font-weight:bold;
    }

    .quote{

      text-align:center;
      margin-top:20px;
      font-size:13px;
      color:#777;
      font-style:italic;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

<div class="login-container">

  <div class="logo">
    🌿
  </div>

  <h2>
    Welcome Back
  </h2>

  <p class="subtitle">
    Login to continue your healing journey 💙
  </p>

  <form id="loginForm">

    <div class="input-group">

      <label>
        Email Address
      </label>

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required>

    </div>

    <p id="loginError" class="login-error" role="alert"></p>

    <div class="input-group">

      <label>
        Password
      </label>

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        required>

    </div>

    <button
      type="submit"
      class="login-btn">

      User Login

    </button>

  </form>

  <a class="admin-btn" href="Admin/admin-login.html">
    Admin Login
  </a>

  <div class="signup-text">

    Don't have an account?

    <a href="register.html">
      Register
    </a>

  </div>

  <div class="quote">

    “Every day is a fresh start 🌈”

  </div>

</div>

<script>

const loginForm =
document.getElementById("loginForm");

const emailInput =
document.getElementById("email");

const passwordInput =
document.getElementById("password");

const loginError =
document.getElementById("loginError");

function showLoginError(message){

  loginError.textContent = message;
  loginError.style.display = "block";
}

function hideLoginError(){

  loginError.textContent = "";
  loginError.style.display = "none";
}

emailInput.addEventListener("input", hideLoginError);
passwordInput.addEventListener("input", hideLoginError);

loginForm.addEventListener(
  "submit",
  async function(e){

    e.preventDefault();

    const email =
      emailInput.value.trim();

    const password =
      passwordInput.value;

    if(!email){

      showLoginError("Please enter your email address.");
      emailInput.focus();
      return;
    }

    try{

      const response =
        await fetch(
          "http://localhost:5000/login",
          {
            method:"POST",

            headers:{
              "Content-Type":
              "application/json"
            },

            body:JSON.stringify({
              email,
              password
            })
          }
        );

      const data =
        await response.json();
      if(data.message === "User not found"){

        showLoginError("User not found. Please register first.");
        return;
      }

      if(data.message === "Invalid Password"){

        showLoginError("Incorrect password.");
        return;
      }

     if(data.message === "Login Successful"){

    localStorage.setItem(
        "isLoggedIn",
        "true"
    );

    localStorage.setItem(
        "userName",
        data.user.name
    );

    localStorage.setItem(
        "userEmail",
        data.user.email
    );

    localStorage.setItem(
        "loggedUser",
        JSON.stringify(data.user)
    );

    alert("Login Successful 💙");

    window.location.href =
        "dashboard.html";
}
    }

    catch(error){

      console.log(error);
      showLoginError("Cannot connect to server. Please try again.");
    }

});

</script>

</body>
</html>
