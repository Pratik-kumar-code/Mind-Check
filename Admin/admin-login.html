<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../api-config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindWell Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#2c3e50,#4ca1af);

}

.container{

width:400px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}

h1{

text-align:center;
margin-bottom:10px;
color:#2c3e50;

}

p{

text-align:center;
margin-bottom:25px;
color:#666;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.input-group input{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;

}

button{

width:100%;
padding:13px;
border:none;
border-radius:10px;
background:#2c7be5;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#1d5dbf;

}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Admin Login</h1>

<p>MindWell Administration Panel</p>

<form id="adminLoginForm">

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Admin Email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password"
required>

</div>

<button type="submit">

Login

</button>

</form>

</div>

<script>

const form =
document.getElementById(
"adminLoginForm"
);

form.addEventListener(

"submit",

async function(e){

e.preventDefault();

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

const response =
await fetch(

"http://localhost:5000/admin/login",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

email,
password

})

}

);

const data =
await response.json();

alert(data.message);

if(data.success){

localStorage.setItem(

"adminLoggedIn",
"true"

);

window.location.href =
"admindashboard.html";

}

}

catch(error){

console.log(error);

alert("Server Error");

}

});

</script>

</body>
</html>
