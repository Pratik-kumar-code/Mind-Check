<!DOCTYPE html>
<html>
<head>
  <script src="api-config.js"></script>
    <title>Assessment History</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7f8;
            padding:30px;
        }

        h1{
            color:#4a6d5a;
        }

        .card{
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        p{
            margin:8px 0;
        }
.delete-btn{

    margin-top:15px;

    background:#dc2626;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-size:15px;

    transition:.3s;

}

.delete-btn:hover{

    background:#b91c1c;

}
    </style>
</head>

<body>

    <h1>📊 Assessment History</h1>

    <div id="historyContainer"></div>

<script>

async function loadHistory(){

    const email =
        localStorage.getItem("userEmail");

    if(!email){
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    const response =
        await fetch(
            "http://localhost:5000/assessment/" + email
        );

    const data =
        await response.json();

    const container =
        document.getElementById(
            "historyContainer"
        );

    container.innerHTML = "";

    if(data.length === 0){

        container.innerHTML =
            "<h2>No assessment history found.</h2>";

        return;
    }

    data.forEach(item => {

       container.innerHTML += `

<div class="card">

    <p><b>Date:</b>
    ${new Date(item.createdAt).toLocaleString()}</p>

    <p><b>Stress:</b> ${item.stress}</p>

    <p><b>Anxiety:</b> ${item.anxiety}</p>

    <p><b>Sleep:</b> ${item.sleep}</p>

    <p><b>Happiness:</b> ${item.happiness}</p>

    <p><b>Focus:</b> ${item.focus}</p>

    <p><b>Motivation:</b> ${item.motivation}</p>

    <button class="delete-btn"
        onclick="deleteAssessment('${item._id}')">

        Delete

    </button>

</div>

`;
    });
}

loadHistory();
async function deleteAssessment(id){

    const confirmDelete = confirm(
        "Are you sure you want to delete this assessment?"
    );

    if(!confirmDelete){

        return;

    }

    try{

        const response = await fetch(

            "http://localhost:5000/assessment/" + id,

            {

                method:"DELETE"

            }

        );

        const result = await response.json();

        alert(result.message);

        loadHistory();

    }

    catch(err){

        console.log(err);

        alert("Error deleting assessment");

    }

}
</script>

</body>
</html>
