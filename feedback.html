<!DOCTYPE html>
<html lang="en">

<head>
  <script src="api-config.js"></script>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MindWell Feedback</title>

    <link rel="stylesheet" href="feedback.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">

            🌿

        </div>

        <h1>MindWell Feedback</h1>

        <p class="subtitle">

            We'd love to hear your thoughts.

        </p>

        <div class="form-group">

            <label>

                Full Name

            </label>

            <input
            type="text"
            id="name"
            placeholder="Enter your name">

        </div>

        <div class="form-group">

            <label>

                Email

            </label>

            <input
            type="email"
            id="email"
            placeholder="Enter your email">

        </div>

        <div class="form-group">

            <label>

                Rating

            </label>

            <div class="stars">

                <i class="fa-regular fa-star star"
                data-value="1"></i>

                <i class="fa-regular fa-star star"
                data-value="2"></i>

                <i class="fa-regular fa-star star"
                data-value="3"></i>

                <i class="fa-regular fa-star star"
                data-value="4"></i>

                <i class="fa-regular fa-star star"
                data-value="5"></i>

            </div>

        </div>

        <div class="form-group">

            <label>

                Feedback

            </label>

            <textarea

            id="message"

            rows="6"

            placeholder="Share your experience with MindWell...">

            </textarea>

        </div>

        <button id="submitBtn">

            <i class="fa-solid fa-paper-plane"></i>

            Submit Feedback

        </button>

    </div>

</div>

<script src="feedback.js"></script>

</body>
</html>
